services:
  web:
    image: nk7260ynpa/tw-stock-indicator
    restart: always
    # 不對外公開 port，僅允許透過 db_network 從其他容器存取 5001
    expose:
      - "5001"
    volumes:
      - ../logs:/app/logs
    environment:
      - DB_HOST=${DB_HOST:-tw_stock_database}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-stock}
      - DB_PORT=${DB_PORT:-3306}
    networks:
      - db_network

networks:
  db_network:
    external: true
